name: Swancord Release
on:
    push:
        branches:
            - main
        paths:
            - src/**
            - scripts/build/**
            - package.json
            - pnpm-lock.yaml

env:
    FORCE_COLOR: true

permissions:
    contents: write

jobs:
    Release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build --standalone

            - name: Get release tag
              run: echo "RELEASE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

            - name: Delete old devbuild release
              run: gh release delete devbuild --yes || true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish release
              run: |
                  gh release create devbuild \
                    dist/patcher.js \
                    dist/preload.js \
                    dist/renderer.js \
                    dist/renderer.css \
                    --title "Swancord ${{ env.RELEASE_TAG }}" \
                    --notes "Automated build from commit ${{ env.RELEASE_TAG }}"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
